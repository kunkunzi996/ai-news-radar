# Nginx static site template for AI News Radar.
# Replace example.com and /opt/ai-news-radar before enabling.

server {
    listen 80;
    server_name example.com;

    root /opt/ai-news-radar;
    index index.html;

    access_log /var/log/nginx/ai-news-radar.access.log;
    error_log /var/log/nginx/ai-news-radar.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /site.webmanifest {
        try_files /site.webmanifest =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ ^/data/.*\.json$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location /data/ {
        return 404;
    }

    # Do not expose source code, local configs, secrets, logs, or private feeds.
    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* ^/(scripts|tests|docs|deploy|skills|\.github|local-secrets|feeds)(/|$) {
        return 404;
    }

    location ~* \.(?:py|md|yml|yaml|toml|lock|jsonl|opml|env|log|db|sqlite)$ {
        return 404;
    }

    location / {
        try_files /index.html =404;
    }
}
