name: Update AI News Snapshot

on:
  push:
    branches:
      - master
    paths-ignore:
      - "data/**"
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

concurrency:
  group: update-ai-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Douyin bridge JSONL
        id: douyin_bridge
        env:
          DOUYIN_BRIDGE_REPO: ${{ vars.DOUYIN_BRIDGE_REPO }}
          DOUYIN_BRIDGE_SSH_KEY: ${{ secrets.DOUYIN_BRIDGE_SSH_KEY }}
        run: |
          # 桥接仓库由采集机（本机/云电脑）定时推送抖音 creator JSONL。
          # 用只读部署密钥克隆；未配置 DOUYIN_BRIDGE_REPO / DOUYIN_BRIDGE_SSH_KEY 时静默跳过，不影响其余信源。
          if [ -z "$DOUYIN_BRIDGE_REPO" ] || [ -z "$DOUYIN_BRIDGE_SSH_KEY" ]; then
            echo "douyin bridge not configured; skipping"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          key_file="$RUNNER_TEMP/douyin_bridge_key"
          printf '%s\n' "$DOUYIN_BRIDGE_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          bridge_dir="$RUNNER_TEMP/douyin-bridge"
          if ! GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new" git clone --quiet --depth 1 "git@github.com:${DOUYIN_BRIDGE_REPO}.git" "$bridge_dir"; then
            echo "::warning::douyin bridge clone failed; continuing without douyin"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ls "$bridge_dir"/output/douyin/jsonl/creator_contents_*.jsonl >/dev/null 2>&1; then
            echo "bridge jsonl found:"
            ls -lh "$bridge_dir"/output/douyin/jsonl/
            echo "local_dir=$bridge_dir" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::douyin bridge repo has no creator_contents_*.jsonl; continuing without douyin"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch WeChat bridge JSONL
        id: wechat_bridge
        env:
          WECHAT_BRIDGE_REPO: ${{ vars.WECHAT_BRIDGE_REPO }}
          WECHAT_BRIDGE_SSH_KEY: ${{ secrets.WECHAT_BRIDGE_SSH_KEY }}
        run: |
          # The private bridge contains public article fields only; auth state stays on the local sidecar.
          if [ -z "$WECHAT_BRIDGE_REPO" ] || [ -z "$WECHAT_BRIDGE_SSH_KEY" ]; then
            echo "::warning::wechat bridge not configured; continuing without WeChat"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          key_file="$RUNNER_TEMP/wechat_bridge_key"
          printf '%s\n' "$WECHAT_BRIDGE_SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          bridge_dir="$RUNNER_TEMP/wechat-bridge"
          if ! GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new" git clone --quiet --depth 1 "git@github.com:${WECHAT_BRIDGE_REPO}.git" "$bridge_dir"; then
            echo "::warning::wechat bridge clone failed; continuing without WeChat"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ls "$bridge_dir"/output/wechat/jsonl/wechat_contents_*.jsonl >/dev/null 2>&1; then
            echo "bridge jsonl found:"
            ls -lh "$bridge_dir"/output/wechat/jsonl/
            echo "local_dir=$bridge_dir" >> "$GITHUB_OUTPUT"
            echo "commit=$(git -C "$bridge_dir" rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::wechat bridge repo has no wechat_contents_*.jsonl; continuing without WeChat"
            echo "local_dir=" >> "$GITHUB_OUTPUT"
          fi

      - name: Update data
        env:
          AI_RELEVANCE_THRESHOLD: ${{ vars.AI_RELEVANCE_THRESHOLD || '0.65' }}
          BILIBILI_DYNAMIC_MAX_ITEMS: ${{ vars.BILIBILI_DYNAMIC_MAX_ITEMS || 10 }}
          BILIBILI_DYNAMIC_MAX_PAGES: ${{ vars.BILIBILI_DYNAMIC_MAX_PAGES || 8 }}
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          MEDIACRAWLER_LOCAL_DIR: ${{ steps.douyin_bridge.outputs.local_dir }}
          WE_MP_RSS_JSONL_DIR: ${{ steps.wechat_bridge.outputs.local_dir }}/output/wechat/jsonl
          WE_MP_RSS_BRIDGE_ROOT: ${{ steps.wechat_bridge.outputs.local_dir }}
          WE_MP_RSS_BRIDGE_COMMIT: ${{ steps.wechat_bridge.outputs.commit }}
          WE_MP_RSS_SUBSCRIPTION_CLEANUP_MODE: ${{ vars.WE_MP_RSS_SUBSCRIPTION_CLEANUP_MODE || 'off' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python scripts/update_news.py --source-config config/online-sources.json --output-dir data --window-hours 24 --archive-days ${{ vars.ARCHIVE_DAYS || '180' }} --all-time

      - name: Commit and push changes
        env:
          EMAIL_DIGEST_PUBLISH: ${{ secrets.EMAIL_DIGEST_PUBLISH || vars.EMAIL_DIGEST_PUBLISH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage the whole data dir so newly added output files can never be
          # silently dropped again (the daily-brief/stories-merged freeze was
          # caused by a stale filename whitelist here). .gitignore keeps
          # data/email-digest.json out of this add.
          git add data/
          if [ -f data/email-digest.json ] && [ "$EMAIL_DIGEST_PUBLISH" = "1" ]; then
            git add -f data/email-digest.json
          fi
          # Self-check: fail loudly if anything under data/ is still unstaged,
          # instead of green-but-stale runs.
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Generated files under data/ were not staged:"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ai news snapshot"
          git push
